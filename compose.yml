services:
  blackglass:
    build:
      context: .
      target: runtime
    image: blackglass:local
    environment:
      BLACKGLASS_CONFIG: /config/blackglass.toml
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - ./config.container.toml:/config/blackglass.toml:ro
      - blackglass-artifacts:/data/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  blackglass-mcp:
    image: blackglass:local
    build:
      context: .
      target: runtime
    command:
      [
        "blackglass-mcp",
        "--config",
        "/config/blackglass.toml",
        "--transport",
        "streamable-http",
        "--host",
        "0.0.0.0",
        "--port",
        "8011",
        "--path",
        "/mcp",
      ]
    environment:
      BLACKGLASS_CONFIG: /config/blackglass.toml
    ports:
      - "127.0.0.1:8011:8011"
    volumes:
      - ./config.container.toml:/config/blackglass.toml:ro
      - blackglass-artifacts:/data/artifacts
    depends_on:
      blackglass:
        condition: service_healthy
    restart: unless-stopped

  blackglass-test:
    build:
      context: .
      target: test
    image: blackglass:test
    environment:
      BLACKGLASS_CONFIG: /config/blackglass.toml
    volumes:
      - ./config.container.toml:/config/blackglass.toml:ro
      - ./config.container.toml:/app/config.container.toml:ro
      - blackglass-artifacts:/data/artifacts
    profiles:
      - test

volumes:
  blackglass-artifacts:
